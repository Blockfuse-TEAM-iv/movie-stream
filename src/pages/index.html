<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieStream - Auth</title>
  <link href="../styles/output.css" rel="stylesheet">
</head>
<body class="bg-black  p-8 ">

<!-- login section -->

  <!-- Card -->
  <div class="flex flex-col md:flex-row bg-[#0b1120]/80 backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl max-w-4xl w-full">

    <!-- Left Image -->
    <div class="md:w-1/2 hidden md:block">
      <img 
        src="https://images.unsplash.com/photo-1608889175123-8ee362201f81?q=80&w=800"
        alt="Movie Poster"
        class="h-full w-full object-cover"
      />
    </div> 

    <!-- Right Form -->
    <div class="w-full md:w-1/2 p-8 text-white ">

      <h2 class="text-2xl font-semibold mb-2">Welcome back,</h2>
      <p class="text-gray-400 mb-6">Sign in to your account</p>

      <!-- Email -->
      <div class="mb-4">
        <label class="text-sm text-gray-400">Email</label>
        <input 
          type="email"
          placeholder="Email"
          class="w-full mt-1 px-4 py-2 bg-transparent border border-red-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="text-sm text-gray-400">Password</label>
        <div class="relative">
          <input 
            type="password"
            placeholder="password"
            class="w-full mt-1 px-4 py-2 bg-transparent border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
          />
          <span class="absolute right-3 top-3 text-gray-400 cursor-pointer">👁️</span>
        </div>
      </div>

      <!-- Forgot -->
      <div class="text-right mb-6">
        <a href="#" class="text-sm text-gray-400 hover:text-white">Forgot password?</a>
      </div>

      <!-- Button -->
      <button class="w-full bg-red-600 hover:bg-red-700 transition py-2 rounded-lg font-semibold">
        Login
      </button>

      <!-- Bottom -->
      <p class="text-sm text-gray-400 text-center mt-6">
        Don’t have an account?
        <a href="#" class="text-red-500 hover:underline">Register</a>
      </p>

    </div>
  </div> <br>


  <!-- Registration  -->

  <!-- Card -->
  <div class="flex flex-col md:flex-row bg-[#0b1120]/80 backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl max-w-4xl w-full">

    <!-- Left Image -->
    <div class="md:w-1/2 hidden md:block">
      <img 
        src="https://images.unsplash.com/photo-1608889175123-8ee362201f81?q=80&w=800"
        alt="Movie Poster"
        class="h-full w-full object-cover"
      />
    </div> 

    <!-- Right Form -->
    <div class="w-full md:w-1/2 p-8 text-white ">

      <h2 class="text-2xl font-bold mb-2">Movie Stream</h2>
      <p class="text-gray-400 mb-6">Register for a new account</p>

      <!-- Email -->
      <div class="mb-4">
        <label class="text-sm text-gray-400">Email</label>
        <input 
          type="email"
          placeholder="Email"
          class="w-full mt-1 px-4 py-2 bg-transparent border border-red-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="text-sm text-gray-400">Password</label>
        <div class="relative">
          <input 
            type="password"
            placeholder="password"
            class="w-full mt-1 px-4 py-2 bg-transparent border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
          />
          <span class="absolute right-3 top-3 text-gray-400 cursor-pointer">👁️</span>
        </div>
      </div>

      
      <!-- Button -->
      <button class="w-full bg-red-600 hover:bg-red-700 transition py-2 rounded-lg font-semibold mt-4">
        Register
      </button>


    </div>
  </div>






  <script type="module">
    import { registerUser, loginUser } from '../js/auth.js';
    import { redirectIfLoggedIn } from '../js/router.js';

    redirectIfLoggedIn();

    const loginSection = document.getElementById('login-section');
    const registerSection = document.getElementById('register-section');
    const alertBox = document.getElementById('alert');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = `p-2 border rounded text-sm mb-4 ${type === 'error' ? 'bg-red-100 border-red-400 text-red-700' : 'bg-green-100 border-green-400 text-green-700'}`;
      alertBox.classList.remove('hidden');
    }

    document.getElementById('to-register').addEventListener('click', () => {
      loginSection.classList.add('hidden');
      registerSection.classList.remove('hidden');
    });

    document.getElementById('to-login').addEventListener('click', () => {
      registerSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await loginUser(e.target[0].value, e.target[1].value);
      if (res.success) window.location.href = './home.html';
      else showAlert(res.message);
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await registerUser(e.target[0].value, e.target[1].value, e.target[2].value);
      if (res.success) {
        showAlert(res.message, 'success');
        setTimeout(() => {
          registerSection.classList.add('hidden');
          loginSection.classList.remove('hidden');
        }, 1500);
      } else showAlert(res.message);
    });
  </script>
</body>
</html>
