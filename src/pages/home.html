<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">

  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';

    requireAuth();
    applyTheme();

    let allMovies = [];

    window.addEventListener('DOMContentLoaded', () => {
      renderNavbar();  
      renderFooter();  
      loadMovies();
      setupFilters();
    });

    // ===============================
    // FETCH MOVIES
    // ===============================
    async function loadMovies() {
      try {
        const res = await fetch('../data/movies.json');
        allMovies = await res.json();

        renderMovies(allMovies);

      } catch (err) {
        console.error('Failed to load movies:', err);
        document.getElementById('empty-state').classList.remove('hidden');
      }
    }

    // ===============================
    // RENDER MOVIES
    // ===============================
    function renderMovies(movies) {
      const movieGrid = document.getElementById('movie-grid');
      const emptyState = document.getElementById('empty-state');

      if (!movies || movies.length === 0) {
        movieGrid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      movieGrid.innerHTML = movies.map(movie => `
        <div class="movie-card bg-slate-900/50 border border-white/5 rounded-xl overflow-hidden transition-all duration-300 hover:scale-[1.02] hover:border-red-600/50 hover:shadow-2xl hover:shadow-red-600/10 cursor-pointer flex flex-col h-full" 
             onclick="window.location.href='movie.html?id=${movie.id}'">
          
          <!-- Poster -->
          <div class="aspect-[2/3] w-full overflow-hidden">
            <img src="${movie.poster}" alt="${movie.title}" 
                 class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
          </div>

          <div class="p-4 flex-grow flex flex-col justify-between">
            <div>
              <!-- Title -->
              <h3 class="text-sm font-bold text-white mb-1 line-clamp-1">
                ${movie.title}
              </h3>

              <!-- Rating & Year -->
              <div class="flex items-center gap-2 text-xs text-slate-400 mb-3">
                <span class="text-red-500 font-bold">★ ${movie.rating}</span>
                <span>•</span>
                <span>${movie.year}</span>
              </div>
            </div>

            <!-- Genres -->
            <div class="flex flex-wrap gap-1.5">
              ${movie.genre.map(g => `
                <span class="text-[10px] uppercase tracking-wider font-bold bg-red-600/10 text-red-500 border border-red-600/20 px-2 py-0.5 rounded">
                  ${g}
                </span>
              `).join('')}
            </div>
          </div>

        </div>
      `).join('');
    }

    // ===============================
    // FILTERS (SEARCH + GENRE)
    // ===============================
    function setupFilters() {
      const searchInput = document.getElementById('movie-search');
      const genreButtons = document.querySelectorAll('.genre-btn');

      let activeGenre = "All";

      // SEARCH
      searchInput.addEventListener('input', () => {
        applyFilters(searchInput.value, activeGenre);
      });

      // GENRE CLICK
      genreButtons.forEach(btn => {
        btn.addEventListener('click', () => {

          // UI active state
          genreButtons.forEach(b => {
            b.classList.remove('bg-red-600', 'text-white');
            b.classList.add('bg-slate-900', 'text-slate-400');
          });

          btn.classList.add('bg-red-600', 'text-white');
          btn.classList.remove('bg-slate-900', 'text-slate-400');

          activeGenre = btn.textContent.trim();
          applyFilters(searchInput.value, activeGenre);
        });
      });
    }

    // ===============================
    // APPLY FILTER LOGIC
    // ===============================
    function applyFilters(searchText, genre) {
      let filtered = [...allMovies];

      // SEARCH FILTER
      if (searchText) {
        filtered = filtered.filter(movie =>
          movie.title.toLowerCase().includes(searchText.toLowerCase())
        );
      }

      // GENRE FILTER
      if (genre !== "All") {
        filtered = filtered.filter(movie =>
          movie.genre.includes(genre)
        );
      }

      renderMovies(filtered);
    }

  </script>
</head>

<body class="bg-black text-slate-200 min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Toast -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <main class="pt-24 space-y-10 flex-grow">

    <!-- Continue Watching -->
    <section id="continue-watching-section" class="hidden px-[4%]">
      <h2 class="text-xl font-bold mb-4">Continue Watching</h2>
      <div id="continue-watching-row" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
    </section>

    <!-- Search + Genre -->
    <section class="px-[4%] space-y-6">
      <div class="flex flex-col md:flex-row gap-4 justify-between items-center">

        <!-- Search -->
        <input id="movie-search" type="text" placeholder="Search movies..." 
          class="bg-slate-900/50 border border-white/5 px-4 py-2 rounded-xl focus:border-red-600 outline-none w-full md:w-80 transition-all">

        <!-- Genres -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 w-full md:w-auto">
          <button class="genre-btn bg-red-600 text-white px-4 py-1 rounded-full text-sm font-medium transition-all">All</button>
          <button class="genre-btn bg-slate-900 text-slate-400 px-4 py-1 rounded-full text-sm font-medium hover:bg-slate-800 transition-all">Action</button>
          <button class="genre-btn bg-slate-900 text-slate-400 px-4 py-1 rounded-full text-sm font-medium hover:bg-slate-800 transition-all">Sci-Fi</button>
          <button class="genre-btn bg-slate-900 text-slate-400 px-4 py-1 rounded-full text-sm font-medium hover:bg-slate-800 transition-all">Drama</button>
        </div>

      </div>
    </section>

    <!-- Movies -->
    <section class="px-[4%] pb-20">
      <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

      <div id="empty-state" class="hidden text-center py-20 text-gray-500">
        No movies found matching your search.
      </div>
    </section>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

</body>
</html>
