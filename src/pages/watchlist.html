<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Watchlist - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">
  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';
    
    requireAuth();
    applyTheme();
    
    window.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderFooter();
    });
  </script>
</head>
<body class="bg-black text-slate-200 min-h-screen flex flex-col">
  <div id="navbar"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
  
  <main class="p-8 pt-24 flex-grow">
    <h1 class="text-3xl font-bold">My Watchlist</h1>
    <p class="text-slate-400 mt-2">Your collection of movies to watch.</p>
  </main>

  <div id="footer"></div>
</body>
</html>
