<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Movie Not Found - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">
  <script type="module">
    import { applyTheme, renderNavbar, renderFooter } from '../js/ui.js';

    // Apply theme
    applyTheme();

    window.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderFooter();
    });
  </script>
</head>
<body class="bg-black text-slate-200 min-h-screen flex flex-col">

  <div id="navbar"></div>

  <main class="flex-grow flex flex-col items-center justify-center px-6 text-center py-20">
    
    <!-- Animated Icon -->
    <div class="relative mb-12 group">
      <div class="absolute inset-0 bg-red-600 blur-3xl opacity-20 group-hover:opacity-40 transition-opacity duration-1000"></div>
      <svg class="w-32 h-32 text-red-600 animate-[spin_10s_linear_infinite] relative" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
      </svg>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-4xl font-black text-white drop-shadow-lg">404</span>
      </div>
    </div>

    <h1 class="text-4xl md:text-6xl font-black text-white mb-6 tracking-tighter uppercase">Scene <span class="text-red-600">Missing</span></h1>
    
    <p class="text-slate-400 max-w-md mx-auto mb-10 text-lg leading-relaxed">
      Oops! It looks like this page was left on the cutting room floor. We can't find the movie or page you're searching for.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 items-center">
      <a href="home.html" class="px-10 py-4 bg-red-600 hover:bg-red-700 text-white rounded-full font-bold uppercase tracking-widest text-sm transition-all active:scale-95 shadow-2xl shadow-red-600/20">
        Back to Home
      </a>
      <button onclick="history.back()" class="px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-full font-bold uppercase tracking-widest text-sm border border-white/5 transition-all active:scale-95">
        Go Back
      </button>
    </div>

  </main>

  <div id="footer"></div>

</body>
</html>
