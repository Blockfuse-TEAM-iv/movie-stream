<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">

  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';
    import { initMovieDetails } from '../js/movies.js';

    // Protect page
    requireAuth();

    // Apply shared theme
    applyTheme();

    window.addEventListener('DOMContentLoaded', async () => {
      // Render shared UI components
      renderNavbar();
      renderFooter();

      // Initialize movie details logic (this handles the hero and the modal player)
      await initMovieDetails();
    });
  </script>
</head>

<body class="bg-black text-slate-200 min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Main content: Backdrop Hero + Info -->
  <main id="movie-content" class="flex-grow relative">
    <!-- Content will be dynamically injected by movies.js -->
    <div class="flex items-center justify-center h-96">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
    </div>
  </main>

  <!-- Player Modal (Managed by movies.js) -->
  <div id="player-modal" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
    <!-- Header -->
    <div class="absolute top-0 left-0 right-0 p-6 flex justify-between items-center z-50 bg-gradient-to-b from-black/80 to-transparent">
      <div id="modal-movie-title" class="text-xl font-bold text-white">Watching Movie</div>
      <button id="modal-close-btn" class="p-2 rounded-full bg-white/10 hover:bg-red-600 text-white transition-all shadow-xl backdrop-blur-md">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Video Container -->
    <div id="video-container" class="relative flex-grow flex items-center justify-center bg-black group overflow-hidden">
      <!-- The Video -->
      <video id="main-video" class="w-full h-full max-h-screen object-contain outline-none z-10"></video>

      <!-- Big Center Play Button (Shown when paused) -->
      <div id="play-overlay" class="absolute inset-0 flex items-center justify-center bg-black/40 cursor-pointer z-20 group/play center-play-btn opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center shadow-2xl shadow-red-600/40 transform scale-90 group-hover/play:scale-100 transition-transform duration-300">
          <svg class="w-12 h-12 text-white fill-current ml-1" viewBox="0 0 20 20"><path d="M5 4v12l10-6z"/></svg>
        </div>
      </div>

      <!-- Controls Overlay -->
      <div id="video-controls" class="absolute bottom-0 left-0 right-0 p-8 pb-10 bg-gradient-to-t from-black via-black/80 to-transparent z-30 transition-all duration-500 translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100">
        
        <!-- Progress Bar (Sleek) -->
        <div class="relative w-full mb-8 group/progress">
          <input type="range" id="seek-bar" value="0" step="0.1" 
                 class="w-full h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-red-600 transition-all group-hover/progress:h-2">
          <!-- Time pointer/glow could be added here in CSS -->
        </div>

        <div class="flex items-center justify-between gap-10">
          <div class="flex items-center gap-8">
            <!-- Play/Pause -->
            <button id="play-pause-btn" class="text-white hover:text-red-500 transition-all active:scale-90 transform">
              <svg id="play-icon" class="w-8 h-8 fill-current" viewBox="0 0 20 20"><path d="M5 4v12l10-6z"/></svg>
              <svg id="pause-icon" class="w-8 h-8 fill-current hidden" viewBox="0 0 20 20"><path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"/></svg>
            </button>

            <!-- Volume -->
            <div class="flex items-center gap-4 group/volume">
              <button id="mute-btn" class="text-white hover:text-red-500 transition-colors transform active:scale-95"></button>
              <div class="w-24 relative pt-1">
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" 
                       class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-red-600 hover:accent-red-500">
              </div>
            </div>

            <!-- Time Display -->
            <div class="flex items-center gap-2 text-sm font-bold text-slate-300 uppercase tracking-tighter">
              <span id="current-time" class="text-white">0:00</span>
              <span class="opacity-30">/</span>
              <span id="total-duration">0:00</span>
            </div>
          </div>

          <div class="flex items-center gap-8">
            <!-- Playback Speed (Fancy Dropdown) -->
            <div class="relative flex items-center gap-2">
              <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Speed</span>
              <select id="speed-selector" 
                      class="bg-white/5 text-xs font-black text-white border border-white/10 rounded-lg px-2 py-1 focus:ring-2 focus:ring-red-600/50 cursor-pointer hover:bg-white/10 transition uppercase">
                <option value="0.5" class="bg-slate-900">0.5x</option>
                <option value="1" class="bg-slate-900" selected>1.0x</option>
                <option value="1.5" class="bg-slate-900">1.5x</option>
                <option value="2" class="bg-slate-900">2.0x</option>
              </select>
            </div>

            <!-- Fullscreen -->
            <button id="fullscreen-btn" class="flex items-center gap-2 text-slate-400 hover:text-white transition-all group/fs">
              <span class="text-[10px] font-black uppercase tracking-widest opacity-0 group-hover/fs:opacity-100 transition-opacity">Full</span>
              <svg class="w-6 h-6 fill-current" viewBox="0 0 20 20"><path d="M1 1v6h2V3h4V1H1zm18 0h-6v2h4v4h2V1zM1 19h6v-2H3v-4H1v6zm18 0h-6v-2h4v-4h2v6z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

</body>
</html>
