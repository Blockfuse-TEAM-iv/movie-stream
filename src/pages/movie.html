<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">

  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';

    // Protect page
    requireAuth();

    // Apply shared theme
    applyTheme();

    window.addEventListener('DOMContentLoaded', () => {
      // Render shared UI components
      renderNavbar();
      renderFooter();
    });
  </script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Main content: empty -->
  <main id="movie-content" class="max-w-6xl mx-auto p-8 pt-24">
    <!-- Content will be dynamically injected if needed -->
  </main>

  <!-- Footer -->
  <div id="footer"></div>

</body>
</html>
