<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">
  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';
    import { initMovieDetails } from '../js/movies.js';
    import { initPlayer } from '../js/player.js';

    // Protect page
    requireAuth();

    // Apply shared theme
    applyTheme();

    window.addEventListener('DOMContentLoaded', async () => {
      // Render shared UI components
      renderNavbar();
      renderFooter();

      // Initialize movie details logic (Await completion to ensure DOM is ready)
      await initMovieDetails();

      // Initialize player logic
      initPlayer();
    });
  </script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">
  <!-- Shared UI Portals -->
  <div id="navbar"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Main Content Container Holder -->
  <main id="movie-content" class="max-w-6xl mx-auto p-8 pt-24">
    <!-- Movie Details will be rendered here by movies.js -->
  </main>

  <!-- Video Player Container (Issue #12) -->
  <div id="video-container"
    class="max-w-6xl mx-auto relative group bg-black rounded-xl overflow-hidden border border-slate-800 shadow-2xl transition-all duration-500 opacity-0 transform translate-y-4 mb-12">
    <!-- The Video Tag -->
    <video id="main-video" class="w-full aspect-video">
      <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Big Play Overlay -->
    <div id="play-overlay"
      class="absolute inset-0 flex items-center justify-center bg-black/40 cursor-pointer group-hover:bg-black/20 transition-all">
      <div
        class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform">
        <svg class="w-10 h-10 text-white fill-current ml-1" viewBox="0 0 20 20">
          <path d="M5 4v12l10-6z" />
        </svg>
      </div>
    </div>

    <!-- Controls Overlay -->
    <div id="video-controls"
      class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/90 via-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
      <!-- Progress Bar -->
      <input type="range" id="seek-bar" value="0" step="0.1"
        class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600 mb-4">

      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <!-- Play/Pause -->
          <button id="play-pause-btn" class="text-white hover:text-blue-400 p-1">
            <svg id="play-icon" class="w-6 h-6 fill-current" viewBox="0 0 20 20">
              <path d="M5 4v12l10-6z" />
            </svg>
            <svg id="pause-icon" class="w-6 h-6 fill-current hidden" viewBox="0 0 20 20">
              <path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z" />
            </svg>
          </button>

          <!-- Volume -->
          <div class="flex items-center gap-2 group/volume">
            <button id="mute-btn" class="text-white hover:text-blue-400 p-1">
              <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                <path d="M14 8.83v6.34L11.83 13H9v-2h2.83L14 8.83M16 4l-5 5H7v6h4l5 5V4z" />
              </svg>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1"
              class="w-0 group-hover/volume:w-20 transition-all h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
          </div>

          <!-- Time Display -->
          <span class="text-xs font-medium text-slate-300">
            <span id="current-time">0:00</span> / <span id="total-duration">0:00</span>
          </span>
        </div>

        <div class="flex items-center gap-4">
          <!-- Playback Speed -->
          <select id="speed-selector"
            class="bg-transparent text-xs font-semibold text-slate-300 border-none focus:ring-0 cursor-pointer hover:text-white transition">
            <option value="0.5" class="bg-slate-900">0.5x</option>
            <option value="1" class="bg-slate-900" selected>1.0x</option>
            <option value="1.5" class="bg-slate-900">1.5x</option>
            <option value="2" class="bg-slate-900">2.0x</option>
          </select>

          <!-- Fullscreen -->
          <button id="fullscreen-btn" class="text-white hover:text-blue-400 p-1">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20">
              <path d="M1 1v6h2V3h4V1H1zm18 0h-6v2h4v4h2V1zM1 19h6v-2H3v-4H1v6zm18 0h-6v-2h4v-4h2v6z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared Footer Portal -->
  <div id="footer"></div>
</body>
</body>

</html>
