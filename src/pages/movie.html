<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">

  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme } from '../js/ui.js';
    import { initMovieDetails } from '../js/movies.js';

    requireAuth();
    applyTheme();

    window.addEventListener('DOMContentLoaded', async () => {
      renderNavbar();
      renderFooter();
      await initMovieDetails();
    });
  </script>
</head>

<body class="bg-black text-slate-200 min-h-screen flex flex-col">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Main content -->
  <main id="movie-content" class="flex-grow">
    <!-- Hero, details, and player will be injected by movies.js -->
    <div class="flex items-center justify-center h-screen">
      <div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  </main>

  <!-- VIDEO PLAYER MODAL -->
  <div id="player-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-sm">
    <div class="relative w-full max-w-5xl mx-4">
      <!-- Close Button -->
      <button id="modal-close-btn" class="absolute -top-12 right-0 flex items-center gap-2 text-slate-400 hover:text-white transition-colors group">
        <span class="text-sm font-medium group-hover:text-white">Close</span>
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Player Container -->
      <div id="video-container" class="relative group bg-black rounded-xl overflow-hidden border border-white/10 shadow-2xl shadow-red-600/5">
        <!-- Video -->
        <video id="main-video" class="w-full aspect-video" preload="metadata"></video>

        <!-- Big Play Overlay -->
        <div id="play-overlay" class="absolute inset-0 flex items-center justify-center bg-black/50 cursor-pointer transition-all">
          <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/40 transform hover:scale-110 transition-transform">
            <svg class="w-10 h-10 text-white fill-current ml-1" viewBox="0 0 20 20">
              <path d="M5 4v12l10-6z" />
            </svg>
          </div>
        </div>

        <!-- Controls Overlay -->
        <div id="video-controls" class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-16 bg-gradient-to-t from-black via-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
          <!-- Progress Bar -->
          <input type="range" id="seek-bar" value="0" step="0.1"
            class="w-full h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-red-600 mb-4">

          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <!-- Play/Pause -->
              <button id="play-pause-btn" class="text-white hover:text-red-400 transition-colors p-1">
                <svg id="play-icon" class="w-6 h-6 fill-current" viewBox="0 0 20 20"><path d="M5 4v12l10-6z" /></svg>
                <svg id="pause-icon" class="w-6 h-6 fill-current hidden" viewBox="0 0 20 20"><path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z" /></svg>
              </button>

              <!-- Volume -->
              <div class="flex items-center gap-2 group/volume">
                <button id="mute-btn" class="text-white hover:text-red-400 transition-colors p-1">
                  <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M14 8.83v6.34L11.83 13H9v-2h2.83L14 8.83M16 4l-5 5H7v6h4l5 5V4z" /></svg>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1"
                  class="w-0 group-hover/volume:w-20 transition-all duration-300 h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-red-600">
              </div>

              <!-- Time -->
              <span class="text-xs font-mono text-slate-300">
                <span id="current-time">0:00</span> / <span id="total-duration">0:00</span>
              </span>
            </div>

            <div class="flex items-center gap-4">
              <!-- Speed -->
              <select id="speed-selector" class="bg-transparent text-xs font-semibold text-slate-300 focus:ring-0 cursor-pointer hover:text-white transition border-none outline-none">
                <option value="0.5" class="bg-slate-900">0.5x</option>
                <option value="1" class="bg-slate-900" selected>1.0x</option>
                <option value="1.5" class="bg-slate-900">1.5x</option>
                <option value="2" class="bg-slate-900">2.0x</option>
              </select>

              <!-- Fullscreen -->
              <button id="fullscreen-btn" class="text-white hover:text-red-400 transition-colors p-1 flex items-center gap-1.5">
                <span class="text-xs font-semibold hidden sm:inline">Expand</span>
                <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20">
                  <path d="M1 1v6h2V3h4V1H1zm18 0h-6v2h4v4h2V1zM1 19h6v-2H3v-4H1v6zm18 0h-6v-2h4v-4h2v6z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

</body>
</html>
