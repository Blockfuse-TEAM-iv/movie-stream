<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">
  <script type="module">
    import { requireAuth } from '../js/router.js';
    import * as UI from '../js/ui.js';
    import { initMovieDetails } from '../js/movies.js';

    // Protect page
    requireAuth();

    // Render shared UI (Safe check since Issue #5 is handled by another member)
    if (UI.renderNavbar) {
      UI.renderNavbar();
    } else {
      console.log('Navbar not yet implemented by team member assigned to #5');
    }

    // Initialize movie details
    initMovieDetails();
  </script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">
  <header></header>

  <main id="movie-content" class="max-w-6xl mx-auto p-8">
    <!-- Loading skeleton or spinner can go here -->
    <div class="animate-pulse flex space-x-4">
      <div class="flex-1 space-y-6 py-1">
        <div class="h-2 bg-slate-700 rounded"></div>
        <div class="space-y-3">
          <div class="grid grid-cols-3 gap-4">
            <div class="h-2 bg-slate-700 rounded col-span-2"></div>
            <div class="h-2 bg-slate-700 rounded col-span-1"></div>
          </div>
          <div class="h-2 bg-slate-700 rounded"></div>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
