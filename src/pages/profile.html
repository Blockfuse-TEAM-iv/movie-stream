<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - MovieStream</title>
  <link href="../styles/output.css" rel="stylesheet">
  <script type="module">
    import { requireAuth } from '../js/router.js';
    import { renderNavbar, renderFooter, applyTheme, showToast } from '../js/ui.js';
    import { getCurrentUser, logoutUser } from '../js/auth.js';

    // Protect page
    requireAuth();
    // Apply theme
    applyTheme();

    window.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderFooter();
      loadProfileData();
    });

    function loadProfileData() {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = './index.html';
        return;
      }

      // Populate Name/Email
      document.getElementById('profile-name').textContent = user.name || 'User';
      document.getElementById('profile-email').textContent = user.email || '—';
      document.getElementById('profile-initial').textContent = (user.name || 'U').charAt(0).toUpperCase();

      // Member Since
      const createdAt = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', { 
        year: 'numeric', month: 'long', day: 'numeric' 
      }) : '—';
      document.getElementById('member-since').textContent = createdAt;

      // Stats
      const watchlist = Array.isArray(user.watchlist) ? user.watchlist : [];
      const progress = user.watchProgress && typeof user.watchProgress === 'object' ? user.watchProgress : {};
      
      document.getElementById('watchlist-count').textContent = watchlist.length;
      document.getElementById('progress-count').textContent = Object.keys(progress).length;
    }

    // Attach sign-out logic
    window.handleSignOut = () => {
      logoutUser();
      window.location.href = './index.html';
    };

  </script>
</head>
<body class="bg-black text-slate-200 min-h-screen flex flex-col">

  <div id="navbar"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <main class="flex-grow pt-28 pb-20 px-[4%] max-w-4xl mx-auto w-full">
    
    <!-- Back Button -->
    <a href="home.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-white transition-colors mb-8 group">
      <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
      </svg>
      <span class="text-sm font-bold uppercase tracking-widest">Back to Home</span>
    </a>

    <!-- Profile Header -->
    <div class="flex flex-col md:flex-row items-center gap-8 mb-12">
      <div class="w-24 h-24 rounded-full bg-red-600 flex items-center justify-center text-4xl font-black text-white shadow-2xl shadow-red-600/30" id="profile-initial">
        U
      </div>
      <div class="text-center md:text-left">
        <h1 class="text-4xl font-black text-white tracking-tight mb-1" id="profile-name">Loading...</h1>
        <p class="text-slate-400 font-medium" id="profile-email">email@example.com</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Stats Box -->
      <div class="bg-slate-900/40 border border-white/5 p-8 rounded-2xl flex flex-col gap-6">
        <h3 class="text-xs font-bold uppercase tracking-widest text-red-500">Your Activity</h3>
        
        <div class="grid grid-cols-2 gap-4">
          <div class="text-center p-4 bg-black/40 rounded-xl border border-white/5">
            <div class="text-3xl font-black text-white" id="watchlist-count">0</div>
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mt-1">Watchlist</div>
          </div>
          <div class="text-center p-4 bg-black/40 rounded-xl border border-white/5">
            <div class="text-3xl font-black text-white" id="progress-count">0</div>
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mt-1">In Progress</div>
          </div>
        </div>

        <div class="pt-4 border-t border-white/5">
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">Member Since</span>
            <span class="text-slate-300 font-medium" id="member-since">January 1, 2024</span>
          </div>
        </div>
      </div>

      <!-- Settings/Actions -->
      <div class="bg-slate-900/40 border border-white/5 p-8 rounded-2xl flex flex-col justify-between items-start">
        <div class="w-full">
          <h3 class="text-xs font-bold uppercase tracking-widest text-red-500 mb-6">Profile Actions</h3>
          <p class="text-sm text-slate-400 leading-relaxed mb-6">
            Update your profile details and manage your account security.
          </p>
        </div>

        <button onclick="handleSignOut()" class="flex items-center gap-3 px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-full text-xs font-bold uppercase tracking-widest transition-all active:scale-95 shadow-xl shadow-red-600/20">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign Out
        </button>
      </div>

    </div>

  </main>

  <div id="footer"></div>

</body>
</html>
